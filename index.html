<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Painel de Tickets • Novetech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'media'};</script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>.glass{backdrop-filter:blur(8px);background:rgba(255,255,255,.7);}@media (prefers-color-scheme:dark){.glass{background:rgba(24,24,27,.6);}}</style>
</head>
<body class="min-h-screen bg-gradient-to-b from-zinc-50 to-zinc-100 dark:from-zinc-950 dark:to-zinc-900 text-zinc-900 dark:text-zinc-50">
<header class="sticky top-0 z-10 glass border-b border-zinc-200/70 dark:border-zinc-800/70">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="inline-flex items-center justify-center w-9 h-9 rounded-xl bg-zinc-900 text-white dark:bg-white dark:text-zinc-900 font-semibold">NT</span>
      <div>
        <h1 class="text-base font-semibold leading-tight">Painel de Tickets</h1>
        <p class="text-xs text-zinc-500 -mt-0.5">Novetech • dados do Excel</p>
        <p id="dbg" class="text-[10px] text-zinc-400"></p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button class="inline-flex items-center gap-2 px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-800 text-sm hover:bg-zinc-50 dark:hover:bg-zinc-800"><i data-lucide="settings" class="w-4 h-4"></i> Preferências</button>
      <button class="inline-flex items-center gap-2 px-3 py-2 rounded-xl bg-zinc-900 text-white dark:bg-white dark:text-zinc-900 text-sm shadow"><i data-lucide="plus" class="w-4 h-4"></i> Novo Ticket</button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-6 space-y-4">
  <section id="kpis" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></section>

  <section class="flex items-center justify-between">
    <div class="flex items-center gap-2 text-sm text-zinc-500"><i data-lucide="filter" class="w-4 h-4"></i> Filtros</div>
    <div id="teamSummary" class="text-xs text-zinc-400">Equipe ativa: 0 <i data-lucide="users" class="inline w-3 h-3 ml-1"></i></div>
  </section>

  <section class="glass rounded-2xl p-4 border border-zinc-200 dark:border-zinc-800 shadow-sm">
    <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-center">
      <div class="md:col-span-4 flex items-center gap-2">
        <div class="relative flex-1">
          <i data-lucide="search" class="w-4 h-4 absolute left-2 top-1/2 -translate-y-1/2 text-zinc-400"></i>
          <input id="q" placeholder="Buscar por título, ID, responsável..." class="w-full pl-8 pr-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-zinc-300 dark:focus:ring-zinc-700"/>
        </div>
      </div>
      <div class="md:col-span-6 grid grid-cols-2 md:grid-cols-4 gap-2">
        <select id="fStatus" class="px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-sm">
          <option value="">Status</option>
          <option>Aberto</option>
          <option>Em Progresso</option>
          <option>Resolvido</option>
          <option>Fechado</option>
          <option>Pendente</option>
        </select>
        <select id="fPriority" class="px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-sm">
          <option value="">Prioridade</option>
          <option>Crítica 🔴</option><option>Alta 🟠</option><option>Média 🟡</option><option>Baixa 🟢</option>
        </select>
        <input id="fStart" type="date" class="px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-sm"/>
        <input id="fEnd" type="date" class="px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 text-sm"/>
      </div>
      <div class="md:col-span-2 flex justify-end gap-2">
        <button id="btnExport" class="inline-flex items-center gap-2 px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-800 text-sm"><i data-lucide="download" class="w-4 h-4"></i> Exportar CSV</button>
        <button id="btnReset" class="inline-flex items-center gap-2 px-3 py-2 rounded-xl border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-800 text-sm"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Limpar</button>
      </div>
    </div>
  </section>

  <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <div class="glass rounded-2xl p-4 border border-zinc-200 dark:border-zinc-800">
      <h3 class="text-sm font-semibold mb-2">Tickets por Status</h3>
      <canvas id="chartStatus" height="230"></canvas>
    </div>
    <div class="glass rounded-2xl p-4 border border-zinc-200 dark:border-zinc-800">
      <h3 class="text-sm font-semibold mb-2">Abertos x Resolvidos (por dia)</h3>
      <canvas id="chartDay" height="230"></canvas>
    </div>
  </section>

  <section class="glass rounded-2xl p-3 border border-zinc-200 dark:border-zinc-800 shadow-sm">
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm" id="tbl">
        <thead>
          <tr class="text-left text-zinc-500 border-b border-zinc-200 dark:border-zinc-800">
            <th class="py-3 px-3">Ticket</th>
            <th class="py-3 px-3">Título</th>
            <th class="py-3 px-3">Cliente</th>
            <th class="py-3 px-3">Status</th>
            <th class="py-3 px-3">Prioridade</th>
            <th class="py-3 px-3">Responsável</th>
            <th class="py-3 px-3">Canal</th>
            <th class="py-3 px-3">Criado</th>
            <th class="py-3 px-3">Atualizado</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="flex justify-between items-center px-3 py-3">
      <p id="pagingText" class="text-xs text-zinc-500"></p>
      <div class="flex items-center gap-2">
        <button id="prev" class="px-3 py-1.5 rounded-lg border text-sm disabled:opacity-40">Anterior</button>
        <span id="pageInfo" class="text-xs text-zinc-500">1/1</span>
        <button id="next" class="px-3 py-1.5 rounded-lg border text-sm disabled:opacity-40">Próxima</button>
      </div>
    </div>
  </section>

  <footer class="py-6 text-center text-xs text-zinc-400">Construído em HTML + Tailwind + Chart.js + Lucide. Dados do Excel ✨</footer>
</main>

function loadData(){
  try{
    const raw = document.getElementById('tickets-data').textContent;
    tickets = JSON.parse(raw);
    const dbg = document.getElementById('dbg'); if(dbg) dbg.textContent = `Tickets carregados: ${tickets.length}`;
  }catch(e){
    console.warn('Falha ao carregar dados:', e);
    tickets = [];
  }
}

function applyFilters(){
  const q = norm(filters.q);
  return tickets.filter(t=>{
    const matchQ = !q || norm([t.id,t.title,t.assignee,t.channel,t.client,(t.tags||[]).join(' ')].join(' ')).includes(q);
    const matchS = !filters.status || norm(t.status) === norm(filters.status);
    const matchP = !filters.priority || norm(t.priority) === norm(filters.priority);
    const matchD1 = !filters.startDate || (t.createdAt || '') >= filters.startDate;
    const matchD2 = !filters.endDate || (t.createdAt || '') <= filters.endDate;
    return matchQ && matchS && matchP && matchD1 && matchD2;
  });
}

function renderKPIs(rows){
  const total = rows.length;
  const abertos = rows.filter(t=>!['resolvido','fechado'].includes(norm(t.status))).length;
  const resolvidos = rows.filter(t=>['resolvido','fechado'].includes(norm(t.status))).length;
  const slaOK = rows.filter(t => (t.timeToFirstResponseHrs ?? 999) <= 4).length;
  const tpl = (title,val,sub,icon)=>`
    <div class="glass border border-zinc-200 dark:border-zinc-800 rounded-2xl p-5 shadow-sm hover:shadow-md transition">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-zinc-500">${title}</p>
          <p class="mt-1 text-2xl font-semibold tracking-tight">${val}</p>
          ${sub?`<p class="mt-2 text-xs text-zinc-400">${sub}</p>`:''}
        </div>
        <i data-lucide="${icon}" class="w-6 h-6 text-zinc-400"></i>
      </div>
    </div>`;
  $('#kpis').innerHTML = [
    tpl('Tickets', total, 'Total filtrado', 'tag'),
    tpl('Em aberto', abertos, 'Aguardando solução', 'alert-triangle'),
    tpl('Resolvidos/Fechados', resolvidos, 'Últimos registros', 'check-circle-2'),
    tpl('SLA OK', `${slaOK}/${total||1}`, '1ª resposta ≤ 4h', 'clock'),
  ].join('');
  try{ if(window.lucide) lucide.createIcons(); }catch(_){}
}

let chartStatus, chartDay;
function renderCharts(rows){
  const byStatus = rows.reduce((acc,t)=>{acc[t.status]=(acc[t.status]||0)+1;return acc;},{});
  const labels = Object.keys(byStatus); const data = Object.values(byStatus);

  const byDay = Array.from(rows.reduce((map,t)=>{
    const d = t.createdAt || 'N/A';
    const cur = map.get(d) || {day:d, criados:0, resolvidos:0};
    cur.criados += 1; if(['resolvido','fechado'].includes(norm(t.status))) cur.resolvidos += 1;
    map.set(d, cur); return map;
  }, new Map()).values()).filter(x=>x.day!=='N/A').sort((a,b)=>a.day.localeCompare(b.day));

  chartStatus && chartStatus.destroy();
  chartDay && chartDay.destroy();
  try{ chartStatus = new Chart(document.querySelector('#chartStatus'), {type:'bar', data:{labels, datasets:[{label:'Tickets', data, borderRadius:6}]}, options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, ticks:{precision:0}}}}}); }catch(e){}
  try{ chartDay = new Chart(document.querySelector('#chartDay'), {type:'line', data:{labels:byDay.map(x=>x.day), datasets:[{label:'Criados', data:byDay.map(x=>x.criados), tension:.4, borderWidth:2}, {label:'Resolvidos', data:byDay.map(x=>x.resolvidos), tension:.4, borderWidth:2}]}, options:{responsive:true, scales:{y:{beginAtZero:true, ticks:{precision:0}}}}}); }catch(e){}
}

function renderTable(rows){
  const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
  if(page > totalPages) page = totalPages;
  const start = (page-1)*pageSize, end = Math.min(page*pageSize, rows.length);
  const slice = rows.slice(start, end);
  $('#tbody').innerHTML = slice.map(t=>`
    <tr class="border-b border-zinc-100 dark:border-zinc-800 hover:bg-zinc-50/60 dark:hover:bg-zinc-800/40">
      <td class="py-3 px-3 font-medium">${t.id||''}</td>
      <td class="py-3 px-3">${t.title||''}</td>
      <td class="py-3 px-3">${t.client||''}</td>
      <td class="py-3 px-3"><span class="inline-flex items-center px-2 py-0.5 text-xs font-medium border rounded-full ${statusClass(t.status)}">${t.status||''}</span></td>
      <td class="py-3 px-3"><span class="inline-flex items-center px-2 py-0.5 text-xs font-medium border rounded-full ${priorityClass(t.priority)}">${t.priority||''}</span></td>
      <td class="py-3 px-3">${t.assignee||''}</td>
      <td class="py-3 px-3">${t.channel||''}</td>
      <td class="py-3 px-3">${t.createdAt||''}</td>
      <td class="py-3 px-3">${t.updatedAt||''}</td>
    </tr>`).join('');
  $('#pagingText').textContent = rows.length ? `Mostrando ${start+1}-${end} de ${rows.length}` : '0 resultados';
  $('#pageInfo').textContent = `${page}/${totalPages}`;
  $('#prev').disabled = page===1; $('#next').disabled = page===totalPages;
}

function refresh(){
  const rows = applyFilters();
  renderKPIs(rows);
  renderCharts(rows);
  renderTable(rows);
  const teamSize = unique(rows.map(t=>t.assignee)).filter(Boolean).length;
  document.getElementById('teamSummary').innerHTML = `Equipe ativa: ${teamSize} <i data-lucide="users" class="inline w-3 h-3 ml-1"></i>`;
  try{ if(window.lucide) lucide.createIcons(); }catch(_){}
}

function wire(){
  document.getElementById('q').addEventListener('input', e=>{ filters.q=e.target.value; page=1; refresh(); });
  document.getElementById('fStatus').addEventListener('change', e=>{ filters.status=e.target.value; page=1; refresh(); });
  document.getElementById('fPriority').addEventListener('change', e=>{ filters.priority=e.target.value; page=1; refresh(); });
  document.getElementById('fStart').addEventListener('change', e=>{ filters.startDate=e.target.value; page=1; refresh(); });
  document.getElementById('fEnd').addEventListener('change', e=>{ filters.endDate=e.target.value; page=1; refresh(); });
  document.getElementById('prev').addEventListener('click', ()=>{ if(page>1){ page--; refresh(); }});
  document.getElementById('next').addEventListener('click', ()=>{ page++; refresh(); });
  document.getElementById('btnExport').addEventListener('click', ()=>{
    const headers = ['id','title','client','status','priority','assignee','channel','createdAt','updatedAt','tags'];
    const rows = applyFilters().map(t=>[t.id, '"'+String(t.title).replaceAll('"','""')+'"', '"'+String(t.client||'').replaceAll('"','""')+'"', t.status, t.priority, t.assignee, t.channel, t.createdAt, t.updatedAt, '"'+(t.tags||[]).join('|')+'"'].join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download=`tickets_export_${new Date().toISOString().slice(0,10)}.csv`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  });
  document.getElementById('btnReset').addEventListener('click', ()=>{
    ['status','priority','startDate','endDate','q'].forEach(k=>filters[k]=''); document.getElementById('q').value=''; page=1; refresh();
  });
}

window.addEventListener('DOMContentLoaded', ()=>{ loadData(); wire(); refresh(); });
</script>
</body>
</html>
